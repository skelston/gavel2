{% block content %}
  <script>
    function toggleReport(state = true) {
      let modal = document.getElementById('reportModal');
      modal.style.display = modal.style.display === "flex" ? "none" : "flex";
      if (!state) modal.style.display = "none"
    }

    function setChecks() {
      let checks = document.forms['checkboxForm'].elements['checkbox[]'];
      let button = document.getElementById('modalReportButton');
      let buttonText = document.getElementById('modalReportText');
      let vals = "";
      let checkedCount = 0;
      for(let i = 0; i < checks.length; i++) {
        if (checks[i].checked) {
          vals += checks[i].value + " ";
          checkedCount++;
        }
      }

      buttonText.classList.toggle("text-red", checkedCount > 0)
      buttonText.classList.toggle("text-lightgray", checkedCount < 1)
      button.classList.toggle("bg-fadedred", checkedCount > 0)
      button.classList.toggle("md:bg-red", checkedCount > 0)
      button.classList.toggle("md:bg-lightgray", checkedCount < 1)
      button.type = checkedCount > 0 ? 'submit' : 'button'

      button.value = vals.trim();
    }

  </script>
  <div class="fixed inset-0 flex justify-center items-end bg-black bg-opacity-50 z-50 pointer" id="doneModal">

    <!-- Modal container -->
    <div class="absolute bottom-0 w-full md:w-44 bg-white md:rounded-8 flex flex-col cursor-default">

      <!-- Close button for desktop -->
      <div class="bg-cross hidden md:block md:absolute top-2.4 right-2.4 cursor-pointer h-1.2 w-1.2" onclick="toggleModal(false)"></div>

      <!-- Modal body -->
      <div class="md:m-2.4 m-1.6">

        <h2 class="pb-1.6 text-18 md:pr-2.4 text-indigo">Select the better project to continue</h2>

        <div class="flex flex-col">

          <!-- Current project -->
          <label class="inline-flex items-center mb-1.6 pointer">
            <input form="doneForm" type="radio" class="form-radio border-lightblue border-2 text-lightblue h-3.2 w-3.2 md:h-2.4 md:w-2.4 pointer" id="doneRadioOne" value="Current" name="action" onclick="setProjects()">
            <div class="flex-col ml-2">
              <p class="uppercase text-indigo text-12 font-medium">current project</p>
              <p class="text-18">{{ next.name }}</p>
            </div>
          </label>

          <!-- Previous project -->
          <label class="inline-flex items-center mb-1.6 pointer">
            <input form="doneForm" type="radio" class="form-radio border-lightblue border-2 text-lightblue h-3.2 w-3.2 md:h-2.4 md:w-2.4 pointer" id="doneRadioTwo" value="Previous" name="action" onclick="setProjects()">
            <div class="flex-col ml-2">
              <p class="uppercase text-lightgray text-12 font-medium">last project you reviewed</p>
              <p class="text-18">{{ prev.name }}</p>
            </div>
          </label>

        </div>

      </div>

      <!-- Buttons -->
      <div class="w-full flex flex-no-wrap border-t border-lightgray">

        <!-- Close button mobile -->
        <div class="w-1/2 text-center flex justify-around border-r border-lightgray md:hidden">
          <span class="h-full w-full flex items-center justify-around text-12 center uppercase text-indigo pointer" onclick="toggleModal(false)">CLOSE</span>
        </div>

        <!-- Next project button -->
        <div class="w-1/2 md:w-auto text-center flex justify-around md:justify-end md:text-white">
          <form action="/vote" method="post" class="h-full w-full flex items-center justify-around text-12 center uppercase text-indigo" id="doneForm">
            <button id="modalDoneButton" class="w-full h-full md:h-4 md:bg-lightgray pointer md:rounded md:px-1.4" type="submit">
              <a class="uppercase text-lightgray text-bold md:text-white" id="modalDoneText" style="margin: 0;">NEXT PROJECT</a>
            </button>
            <input type="hidden" name="prev_id" value="{{ prev.id }}">
            <input type="hidden" name="next_id" value="{{ next.id }}">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
          </form>
        </div>

      </div>

    </div>
  </div>

  <script>
    // Optional: close modal when clicking outside
    const doneModal = document.getElementById('doneModal');
    doneModal.addEventListener('click', (e) => {
      if (e.target === doneModal) toggleModal(false);
    });
  </script>

        toggleReport(false)
      }
    }
  </script>
{% endblock %}
